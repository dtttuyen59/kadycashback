<script>

let finalLink="";

function formatMoney(x){
return Number(x).toLocaleString("vi-VN")+"đ";
}

function create(){

const link=document.getElementById("link").value.trim();

const price=Number(document.getElementById("price").value);

if(link==""){
alert("Nhập link Shopee");
return;
}

if(price<=0){
alert("Nhập giá sản phẩm");
return;
}

finalLink=link;

const cashback=Math.round(price*0.90*0.95);

document.getElementById("cashback").innerHTML=formatMoney(cashback);

window.zaloText=
`🌽 KADY CASHBACK 🌽

🛒 Link:
${link}

💰 Giá sản phẩm:
${formatMoney(price)}

🎁 Hoàn ước tính:
${formatMoney(cashback)}

🔥 Bấm MUA NGAY để đặt hàng nhé!`;
}

function copyText(){

if(!window.zaloText){
alert("Hãy tính trước.");
return;
}

navigator.clipboard.writeText(window.zaloText);

alert("Đã copy nội dung Zalo.");

}

function buy(){

if(finalLink==""){
alert("Chưa có link.");
return;
}

window.open(finalLink,"_blank");

}

</script>

</body>
</html>
