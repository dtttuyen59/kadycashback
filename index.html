<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KADY CASHBACK</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#ee4d2d;padding:20px}
.container{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.2)
}
.logo{
font-size:60px;
text-align:center
}
h1{
text-align:center;
color:#ee4d2d;
margin:10px 0 20px
}
label{
display:block;
margin-top:10px;
font-weight:bold
}
input{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ddd;
border-radius:10px;
font-size:16px
}
button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:12px;
font-size:17px;
font-weight:bold;
cursor:pointer
}
.calc{background:#ee4d2d;color:#fff}
.copy{background:#16a34a;color:#fff}
.buy{background:#2563eb;color:#fff}
.result{
margin-top:20px;
padding:15px;
background:#fff7f4;
border-radius:12px
}
.money{
font-size:28px;
font-weight:bold;
color:#ee4d2d
}
</style>

</head>
<body>

<div class="container">

<div class="logo">🌽</div>

<h1>KADY CASHBACK</h1>

<label>🔗 Link Shopee</label>
<input id="link" type="text" placeholder="Dán link Shopee">

<label>💵 Giá sản phẩm (đ)</label>
<input id="price" type="number" placeholder="Ví dụ: 210206">

<label>📈 % Hoa hồng Affiliate</label>
<input id="percent" type="number" placeholder="Ví dụ: 10">

<button class="calc" onclick="calculate()">
💰 TÍNH HOÀN ƯỚC TÍNH
</button>

<div class="result">
<div>💸 Hoàn ước tính</div>

<div class="money" id="cashback">
0đ
</div>

<div style="margin-top:10px;font-size:13px;color:#666">
Công thức:<br>
Giá × (% hoa hồng /100) × 90% × 95%
</div>

</div>

<button class="copy" onclick="copyText()">
📋 COPY NỘI DUNG ZALO
</button>

<button class="buy" onclick="buyNow()">
🛒 MUA NGAY
</button>

<script>

let finalLink="";
let zaloText="";

function money(x){
return Number(x).toLocaleString("vi-VN")+"đ";
}

function calculate(){

const link=document.getElementById("link").value.trim();
const price=Number(document.getElementById("price").value);
const percent=Number(document.getElementById("percent").value);

if(link==""){
alert("Vui lòng nhập link Shopee");
return;
}

if(price<=0){
alert("Vui lòng nhập giá sản phẩm");
return;
}

if(percent<=0){
alert("Vui lòng nhập % hoa hồng");
return;
}

finalLink=link;

const cashback=Math.round(
price*(percent/100)*0.9*0.95
);

document.getElementById("cashback").innerHTML=
money(cashback);

zaloText=
`🌽 KADY CASHBACK 🌽

🔗 Link:
${link}

💵 Giá:
${money(price)}

📈 Hoa hồng:
${percent}%

💰 Hoàn ước tính:
${money(cashback)}

📌 Công thức:
Giá × ${percent}% × 90% × 95%

🛒 MUA NGAY:
${link}`;
}

function copyText(){

if(zaloText==""){
alert("Hãy bấm TÍNH HOÀN ƯỚC TÍNH trước");
return;
}

navigator.clipboard.writeText(zaloText);
alert("Đã copy nội dung.");
}

function buyNow(){

if(finalLink==""){
alert("Chưa có link Shopee");
return;
}

window.open(finalLink,"_blank");
}
  
</script>

</div>

</body>
</html>
